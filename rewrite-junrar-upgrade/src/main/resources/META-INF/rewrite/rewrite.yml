---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.junrar.UpgradeJunrarTo7_5_10
displayName: Upgrade selected Junrar dependencies to 7.5.10
description: >-
  Upgrade only exact com.github.junrar:junrar 7.5.5 and 7.5.8 declarations
  whose Maven or root Gradle owner is local, exclusive and unambiguous.
tags:
  - junrar
  - java
  - dependency-upgrade
recipeList:
  - com.huawei.clouds.openrewrite.junrar.MarkSelectedJunrarProjects
  - com.huawei.clouds.openrewrite.junrar.UpgradeSelectedJunrarDependency
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.junrar.InventoryJunrarExtractionEntrypoints
displayName: Inventory Junrar extraction entry points
description: >-
  Directly reuse fixed OpenRewrite Core FindMethods leaves to locate exact
  Junrar extraction, stream and archive-entry path calls in authored source.
tags:
  - junrar
  - java
  - official-openrewrite
  - search
preconditions:
  - com.huawei.clouds.openrewrite.junrar.FindAuthoredJavaSource
recipeList:
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.github.junrar.Junrar extract(..)
      matchOverrides: false
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.github.junrar.Archive extractFile(..)
      matchOverrides: false
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.github.junrar.Archive getInputStream(..)
      matchOverrides: false
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.github.junrar.rarfile.FileHeader getFileName()
      matchOverrides: false
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.github.junrar.rarfile.FileHeader getFileNameW()
      matchOverrides: false
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.github.junrar.rarfile.FileHeader getFileNameString()
      matchOverrides: false
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.github.junrar.rarfile.FileHeader getFileNameByteArray()
      matchOverrides: false
  - org.openrewrite.java.search.FindMethods:
      methodPattern: com.github.junrar.volume.InputStreamVolume getLength()
      matchOverrides: false
---
type: specs.openrewrite.org/v1beta/recipe
