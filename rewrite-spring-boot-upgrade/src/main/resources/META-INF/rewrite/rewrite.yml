type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springboot.SpringBootSourceVisitors_3_2
displayName: Apply Spring Boot 3.2 source migrations
description: Reuse precise official Boot and corrected OpenRewrite Core type-move leaves introduced for Spring Boot 3.2.
tags:
  - spring-boot
  - java
  - source-migration
recipeList:
  - org.openrewrite.java.spring.boot3.MigrateHooksToReactorContextProperty
  - org.openrewrite.java.spring.boot3.RelocateLauncherClasses
  # rewrite-spring 6.35.0's spring-boot-32.yml points TaskSchedulerBuilder at
  # ThreadPoolTaskExecutorBuilder. Spring Boot's pinned 3.2 release notes and
