type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.ngxinfinitescroll.MigrateInfiniteScrollModuleToStandaloneDirective
displayName: Migrate InfiniteScrollModule to InfiniteScrollDirective
description: Replace an unambiguous ngx-infinite-scroll named import and Angular imports/exports metadata reference with the 17.0.1 standalone directive; ambiguous or custom references remain for the audit recipe.
tags:
  - ngx-infinite-scroll
  - angular
  - standalone
  - source-migration
preconditions:
  - org.openrewrite.FindSourceFiles:
      filePattern: "**/*.ts"
  - org.openrewrite.text.Find:
      find: 'import\s*\{(?=[^}]*\bInfiniteScrollModule\b)(?![^}]*\bInfiniteScrollDirective\b)[^}]*\}\s*from\s*["'']ngx-infinite-scroll["'']'
      regex: true
      caseSensitive: true
      multiline: true
      filePattern: "**/*.ts"
recipeList:
  - org.openrewrite.text.FindAndReplace:
      find: '(?<prefix>import\s*\{(?:(?!\}).)*?)\bInfiniteScrollModule\b(?<suffix>(?:(?!\}).)*?\}\s*from\s*["'']ngx-infinite-scroll["''])'
      replace: '${prefix}InfiniteScrollDirective${suffix}'
      regex: true
      caseSensitive: true
      multiline: true
      dotAll: true
      filePattern: "**/*.ts"
      plaintextOnly: false
  - org.openrewrite.text.FindAndReplace:
      find: '(?<prefix>\b(?:imports|exports)\s*:\s*\[(?:(?!\]).)*?)\bInfiniteScrollModule\b'
      replace: '${prefix}InfiniteScrollDirective'
      regex: true
      caseSensitive: true
      multiline: true
      dotAll: true
      filePattern: "**/*.ts"
      plaintextOnly: false
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.ngxinfinitescroll.AuditNgxInfiniteScroll17Compatibility
displayName: Locate ngx-infinite-scroll 17 compatibility work
description: Mark Angular peer declarations, deprecated module references, unsupported deep imports, and behavior-sensitive directive inputs for focused Angular 17, scrolling, SSR, and change-detection review.
tags:
  - ngx-infinite-scroll
  - angular-17
  - search
recipeList:
  - org.openrewrite.json.search.FindKey:
      key: $.dependencies['@angular/core']
  - org.openrewrite.json.search.FindKey:
      key: $.devDependencies['@angular/core']
  - org.openrewrite.json.search.FindKey:
      key: $.peerDependencies['@angular/core']
  - org.openrewrite.json.search.FindKey:
      key: $.optionalDependencies['@angular/core']
  - org.openrewrite.json.search.FindKey:
      key: $.dependencies['@angular/common']
  - org.openrewrite.json.search.FindKey:
      key: $.devDependencies['@angular/common']
  - org.openrewrite.json.search.FindKey:
      key: $.peerDependencies['@angular/common']
  - org.openrewrite.json.search.FindKey:
      key: $.optionalDependencies['@angular/common']
  - org.openrewrite.text.Find:
      find: '\bInfiniteScrollModule\b'
      regex: true
      caseSensitive: true
      filePattern: "**/*.ts"
      description: true
      contextSize: 80
  - org.openrewrite.text.Find:
      find: 'from\s*["'']ngx-infinite-scroll/'
      regex: true
      caseSensitive: true
      filePattern: "**/*.ts"
      description: true
      contextSize: 80
  - org.openrewrite.text.Find:
      find: '\b(?:infiniteScrollContainer|fromRoot|scrollWindow|immediateCheck|infiniteScrollThrottle|alwaysCallback|horizontal|infiniteScrollDisabled)\b'
      regex: true
      caseSensitive: true
      filePattern: "**/*.html;**/*.ts"
      description: true
      contextSize: 120
---
