type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.guava.FindGuavaAndroidFlavorMigration
displayName: Find Guava Android-to-JRE flavor switches
description: Mark the listed 32.1.1-android dependency because changing it to the spreadsheet's JRE target requires an Android platform and minSdk review.
tags:
  - guava
  - android
  - search
recipeList:
  - org.openrewrite.java.dependencies.FindDependency:
      groupId: com.google.guava
      artifactId: guava
      version: 32.1.1-android
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.guava.FindGuavaBuildMigrationRisks
displayName: Find Guava build and GWT migration risks
description: Mark Gradle 6 wrappers that need dependency-metadata testing and the obsolete GWT-RPC emergency switch.
tags:
  - guava
  - gradle
  - gwt
  - search
recipeList:
  - org.openrewrite.text.Find:
      find: '(?m)^distributionUrl=.*gradle-6(?:\.|-).*'
      regex: true
      caseSensitive: true
      multiline: true
      dotAll: false
      filePattern: '**/gradle-wrapper.properties'
  - org.openrewrite.text.Find:
      find: 'guava\.gwt\.emergency_reenable_rpc'
      regex: true
      caseSensitive: true
      multiline: false
      dotAll: false
      filePattern: '**/*.gwt.xml;**/*.properties'
---
