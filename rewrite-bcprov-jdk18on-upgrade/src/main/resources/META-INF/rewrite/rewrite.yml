type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.bcprovjdk18on.MigrateDeterministicBcProv1_84Java
displayName: Migrate deterministic Bouncy Castle 1.84 Java API moves
description: Directly compose official OpenRewrite leaves for package, type, method, and constant changes, plus the exact former ECPrivateKey getter implementation.
tags:
  - bouncycastle
  - bcprov
  - source-migration
preconditions:
  - com.huawei.clouds.openrewrite.bcprovjdk18on.FindAuthoredSourceFiles
recipeList:
  - com.huawei.clouds.openrewrite.bcprovjdk18on.MigrateAttributedBikePackage
  - com.huawei.clouds.openrewrite.bcprovjdk18on.MigrateAttributedPicnicPackage
  - com.huawei.clouds.openrewrite.bcprovjdk18on.MigrateAttributedRainbowPackage
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.bouncycastle.pqc.jcajce.provider.util.WrapUtil
      newFullyQualifiedTypeName: org.bouncycastle.jcajce.provider.asymmetric.util.WrapUtil
      ignoreDefinition: true
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.bouncycastle.util.Pack longToBigEndian(long, byte[], int, int)
      newMethodName: longToBigEndian_Low
      matchOverrides: false
      ignoreDefinition: true
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.bouncycastle.crypto.hpke.HPKE.kem_P384_SHA348
      fullyQualifiedConstantName: org.bouncycastle.crypto.hpke.HPKE.kem_P384_SHA384
  - com.huawei.clouds.openrewrite.bcprovjdk18on.MigrateBcProv184Java
