type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springretry.UpgradeMarkedSpringRetryDependencyTo2_0_13
displayName: Upgrade Spring Retry only inside marked projects
description: Run the strict declaration-level dependency recipe only below an exact, non-conflicting 1.3.4 build root.
tags:
  - spring
  - retry
  - source-version-gate
preconditions:
  - com.huawei.clouds.openrewrite.springretry.FindSelectedSpringRetryBuildFiles
recipeList:
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.springframework.retry
      artifactId: spring-retry
      newVersion: 2.0.13
      overrideManagedVersion: false
  # The official Maven delegate requires Maven resolution markers. Keep the
  # strict local visitor as a deterministic fallback for raw XML source sets;
  # it is a no-op after the official recipe has already upgraded a declaration.
  - com.huawei.clouds.openrewrite.springretry.UpgradeSelectedSpringRetryDependency
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springretry.MigrateOfficialSpringRetry20JavaLeaves
displayName: Internal official Spring Retry 2.0 Java leaves
description: >-
  Internal raw bundle of fixed official core recipes. Activate the guarded
  MigrateDeterministicSpringRetry20Java recipe instead.
tags:
  - spring
  - retry
  - java
  - official-openrewrite
recipeList:
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: org.springframework.retry.annotation.Retryable
      oldAttributeName: value
      newAttributeName: retryFor
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: org.springframework.retry.annotation.Retryable
      oldAttributeName: include
      newAttributeName: retryFor
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: org.springframework.retry.annotation.Retryable
      oldAttributeName: exclude
      newAttributeName: noRetryFor
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: org.springframework.retry.annotation.CircuitBreaker
      oldAttributeName: value
      newAttributeName: retryFor
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: org.springframework.retry.annotation.CircuitBreaker
      oldAttributeName: include
      newAttributeName: retryFor
  - org.openrewrite.java.ChangeAnnotationAttributeName:
      annotationType: org.springframework.retry.annotation.CircuitBreaker
      oldAttributeName: exclude
      newAttributeName: noRetryFor
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.springframework.retry.support.RetryTemplateBuilder withinMillis(long)
      newMethodName: withTimeout
      matchOverrides: false
      ignoreDefinition: false
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springretry.MigrateDeterministicSpringRetry20Java
displayName: Safely migrate deterministic Spring Retry 2.0 Java APIs
description: Protect conflicting annotations, run the fixed official leaves on safe annotations, restore conflicts, and exclude generated sources.
tags:
  - spring
  - retry
  - java
  - official-openrewrite
preconditions:
  - com.huawei.clouds.openrewrite.springretry.FindAuthoredSourceFiles
  - com.huawei.clouds.openrewrite.springretry.FindPendingSpringRetryAnnotationMigration
recipeList:
  # Declarative preconditions are source-file scoped. Shield conflicts before
  # the official leaves so a safe annotation in the same file can still migrate.
  - com.huawei.clouds.openrewrite.springretry.ProtectSpringRetryAnnotationAliasConflicts
  - com.huawei.clouds.openrewrite.springretry.MigrateOfficialSpringRetry20JavaLeaves
  - com.huawei.clouds.openrewrite.springretry.RestoreSpringRetryAnnotationAliasConflicts
---
