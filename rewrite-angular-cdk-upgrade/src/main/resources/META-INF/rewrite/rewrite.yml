packageName: com.huawei.clouds.openrewrite.angular
description: Upgrade Angular CDK with explicit lockstep and CLI migration guidance.
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.angular.UpgradeAngularCdkTo20_2_14
displayName: Upgrade @angular/cdk to 20.2.14
description: Update older direct @angular/cdk declarations in package.json to 20.2.14 without downgrading later versions or workspace references.
tags:
  - angular
  - angular-cdk
  - nodejs
  - dependency-upgrade
preconditions:
  - org.openrewrite.FindSourceFiles:
      filePattern: package.json;**/package.json
recipeList:
  - org.openrewrite.json.ChangeValue:
      oldKeyPath: >-
        $.dependencies[?(@['@angular/cdk'] =~ '^[<>=~^ ]*(?:1[0-9]\.|20\.(?:[01]\.|2\.(?:[0-9]|1[0-3])(?:[^0-9]|$))).*')]['@angular/cdk']
      value: '"20.2.14"'
  - org.openrewrite.json.ChangeValue:
      oldKeyPath: >-
        $.devDependencies[?(@['@angular/cdk'] =~ '^[<>=~^ ]*(?:1[0-9]\.|20\.(?:[01]\.|2\.(?:[0-9]|1[0-3])(?:[^0-9]|$))).*')]['@angular/cdk']
      value: '"20.2.14"'
  - org.openrewrite.json.ChangeValue:
      oldKeyPath: >-
        $.peerDependencies[?(@['@angular/cdk'] =~ '^[<>=~^ ]*(?:1[0-9]\.|20\.(?:[01]\.|2\.(?:[0-9]|1[0-3])(?:[^0-9]|$))).*')]['@angular/cdk']
      value: '"20.2.14"'
  - org.openrewrite.json.ChangeValue:
      oldKeyPath: >-
        $.optionalDependencies[?(@['@angular/cdk'] =~ '^[<>=~^ ]*(?:1[0-9]\.|20\.(?:[01]\.|2\.(?:[0-9]|1[0-3])(?:[^0-9]|$))).*')]['@angular/cdk']
      value: '"20.2.14"'
