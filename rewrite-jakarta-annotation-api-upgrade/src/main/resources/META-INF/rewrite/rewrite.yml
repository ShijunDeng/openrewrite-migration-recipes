type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.jakartaannotation.FindRemovedManagedBeanUsages
displayName: Find ManagedBean usages removed by Jakarta Annotations 3.0
description: Mark javax.annotation.ManagedBean or jakarta.annotation.ManagedBean references for a mandatory manual CDI or platform-specific migration; this recipe never invents a jakarta.annotation.ManagedBean type.
tags:
  - jakarta-annotations
  - managed-bean
  - search
recipeList:
  - org.openrewrite.java.search.FindTypes:
      fullyQualifiedTypeName: javax.annotation.ManagedBean
      checkAssignability: false
  - org.openrewrite.java.search.FindTypes:
      fullyQualifiedTypeName: jakarta.annotation.ManagedBean
      checkAssignability: false
