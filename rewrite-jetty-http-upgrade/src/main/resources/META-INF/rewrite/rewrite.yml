name: com.huawei.clouds.openrewrite.jettyhttp.FindJettyHttp12_0_34BuildRisks
displayName: Find Jetty HTTP 12.0.34 build risks
description: >-
  Mark no-downgrade conflicts, versions outside the exact whitelist, unresolved
  owners, variants, Java baselines, Jetty family skew and repackaging.
recipeList:
  - com.huawei.clouds.openrewrite.jettyhttp.FindJettyHttpBuildRisks
