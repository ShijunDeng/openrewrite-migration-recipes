type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.kubernetesclientjava.MigrateDeterministicFabric8SourceTo7
displayName: Migrate deterministic Fabric8 Kubernetes Client APIs to version 7
description: Apply official one-to-one package, type, method, mock-server, and safely typed client-construction replacements.
tags:
  - fabric8
  - kubernetes-client
  - java
  - source-migration
recipeList:
  - com.huawei.clouds.openrewrite.kubernetesclientjava.MigrateDefaultKubernetesClientConstruction
  - org.openrewrite.java.ChangePackage:
      oldPackageName: io.fabric8.kubernetes.client.internal.readiness
      newPackageName: io.fabric8.kubernetes.client.readiness
      recursive: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.fabric8.kubernetes.client.CustomResourceList
      newFullyQualifiedTypeName: io.fabric8.kubernetes.api.model.DefaultKubernetesResourceList
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: io.fabric8.kubernetes.client.informers.SharedInformer
      newFullyQualifiedTypeName: io.fabric8.kubernetes.client.informers.SharedIndexInformer
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: io.fabric8.kubernetes.client.dsl.Applicable apply()
      newMethodName: createOrReplace
  - org.openrewrite.java.ChangePackage:
      oldPackageName: io.fabric8.openshift.api.model.clusterautoscaling
      newPackageName: io.fabric8.openshift.api.model.autoscaling
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: io.fabric8.openshift.api.model.machineconfig
      newPackageName: io.fabric8.openshift.api.model.machineconfiguration
      recursive: true
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: io.fabric8.openshift.client.OpenShiftClient clusterAutoscaling()
      newMethodName: openShiftAutoscaling
  - org.openrewrite.java.ChangePackage:
      oldPackageName: io.fabric8.verticalpodautoscaler.api.model
      newPackageName: io.fabric8.autoscaling.api.model.v1
      recursive: true
  - com.huawei.clouds.openrewrite.kubernetesclientjava.MigrateFabric8MockWebServerTo7
