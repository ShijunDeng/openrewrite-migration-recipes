type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.kubernetesclientjava.FindManualFabric8KubernetesClient7JavaRisks
displayName: Find Fabric8 Kubernetes Client 7 Java migration risks
description: Mark type-attributed resource, delete, configuration, client construction, watch/informer, streaming, and support checks plus removed APIs requiring application choices.
tags:
  - fabric8
  - kubernetes-client
  - java
  - search
recipeList:
  - com.huawei.clouds.openrewrite.kubernetesclientjava.FindFabric8KubernetesClient7MigrationRisks
  - org.openrewrite.text.Find:
      find: '\b(?:RawCustomResourceOperations|GenericKubernetesClient|AutoAdaptableKubernetesClient|SupportTestingClient|OpenShiftMockServer|EnableOpenShiftMockClient|HttpClientUtils|OkHttpClientFactory|OperationContext|IntOrString|PrinterColumn)\b|\.(?:setIntVal|setStrVal|setKind|writingInput|readingInput|readingOutput|readingError|redirectingInput|withReadyWaitTimeout)[ \t]*\('
      regex: true
      caseSensitive: true
      filePattern: "**/*.java;**/*.groovy;**/*.kt"
      contextSize: 0
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.kubernetesclientjava.FindManualFabric8KubernetesClient7BuildRisks
displayName: Find Fabric8 Kubernetes Client 7 build and baseline risks
description: Mark Java levels below 11, Fabric8 BOM ownership, split client/model/HTTP/mock modules, and renamed extension artifacts that require coordinated version or transport decisions.
tags:
  - fabric8
  - kubernetes-client
  - build
  - search
recipeList:
  - org.openrewrite.text.Find:
      find: '<(?:maven\.compiler\.(?:source|target|release)|source|target|release)>[ \t]*(?:1\.[0-8]|[0-9]|10)[ \t]*</|<artifactId>(?:kubernetes-client-bom|kubernetes-client-api|kubernetes-model|kubernetes-httpclient-(?:okhttp|vertx)|kubernetes-server-mock|openshift-client|openshift-model-(?:clusterautoscaling|machineconfig)|cert-manager-model-v1(?:alpha2|alpha3|beta1)?|istio-model-v1(?:alpha3|beta1)|open-virtual-networking(?:-client|-model-v1)?|verticalpodautoscaler-model-v1)</artifactId>'
      regex: true
      caseSensitive: true
      filePattern: "**/pom.xml"
      contextSize: 0
  - org.openrewrite.text.Find:
      find: '(?:sourceCompatibility|targetCompatibility|languageVersion)[ \t]*(?:=|\.set\(|\.of\()[ \t]*["'']?(?:1\.[0-8]|[0-9]|10)\b|io\.fabric8:(?:kubernetes-client-bom|kubernetes-client-api|kubernetes-model|kubernetes-httpclient-(?:okhttp|vertx)|kubernetes-server-mock|openshift-client|openshift-model-(?:clusterautoscaling|machineconfig)|cert-manager-model-v1(?:alpha2|alpha3|beta1)?|istio-model-v1(?:alpha3|beta1)|open-virtual-networking(?:-client|-model-v1)?|verticalpodautoscaler-model-v1)'
      regex: true
      caseSensitive: true
      filePattern: "**/*.gradle;**/*.gradle.kts;**/*.toml"
      contextSize: 0
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.kubernetesclientjava.FindManualFabric8KubernetesClient7ConfigurationRisks
displayName: Find Fabric8 Kubernetes Client 7 behavior and configuration risks
description: Mark settings and resource manifests affected by compatibility-interceptor, namespace, kubeconfig, model serialization, readiness, API-version, and HTTP transport changes.
tags:
  - fabric8
  - kubernetes-client
  - configuration
  - search
recipeList:
  - org.openrewrite.text.Find:
      find: 'kubernetes\.backwardsCompatibilityInterceptor\.disable|KUBERNETES_BACKWARDSCOMPATIBILITYINTERCEPTOR_DISABLE|KUBERNETES_KUBECONFIG_FILE|httpclient|okhttp|vertx|readyWaitTimeout|apiVersion[ \t]*:'
      regex: true
      caseSensitive: false
      filePattern: "**/*.properties;**/*.yml;**/*.yaml;**/*.json;**/*.xml;**/*.conf;**/*.env"
      contextSize: 0
