type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.kubernetesclientjava.MigrateFabric8MockWebServerTo7
displayName: Migrate Fabric8 mock-server tests from OkHttp types
description: Replace the exact OkHttp and Okio test types listed by the Fabric8 7 migration guide, but only in source files that use okhttp3.mockwebserver.
preconditions:
  - org.openrewrite.text.Find:
      find: 'okhttp3\.mockwebserver\.(?:Dispatcher|MockResponse|MockWebServer|QueueDispatcher|RecordedRequest)'
      regex: true
      caseSensitive: true
      filePattern: "**/*.java"
      contextSize: 0
recipeList:
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okhttp3.Headers
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.http.Headers
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okhttp3.HttpUrl
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.http.HttpUrl
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okhttp3.MediaType
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.http.MediaType
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okhttp3.Protocol
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.vertx.Protocol
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okhttp3.Response
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.http.Response
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okhttp3.WebSocket
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.http.WebSocket
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okhttp3.WebSocketListener
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.http.WebSocketListener
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okhttp3.mockwebserver.Dispatcher
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.http.Dispatcher
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okhttp3.mockwebserver.MockResponse
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.http.MockResponse
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okhttp3.mockwebserver.MockWebServer
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.MockWebServer
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okhttp3.mockwebserver.QueueDispatcher
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.http.QueueDispatcher
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okhttp3.mockwebserver.RecordedRequest
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.http.RecordedRequest
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okio.Buffer
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.http.Buffer
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: okio.ByteString
      newFullyQualifiedTypeName: io.fabric8.mockwebserver.http.ByteString
