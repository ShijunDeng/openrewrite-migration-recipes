displayName: Upgrade kafka-clients to 4.1.2
description: Upgrade only exact spreadsheet-visible org.apache.kafka:kafka-clients versions in standard Maven and Gradle declarations; preserve ranges, dynamic values, custom artifacts, BOM-owned versions and unlisted releases.
