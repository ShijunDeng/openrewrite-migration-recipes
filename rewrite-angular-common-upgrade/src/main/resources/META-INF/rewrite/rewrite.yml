---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.angular.UpgradeAngularCommonTo20_3_26
displayName: Upgrade @angular/common to 20.3.26
description: Update direct @angular/common declarations in package.json to 20.3.26. Other Angular packages and CLI migrations must be handled in lockstep.
tags:
  - angular
  - angular-common
  - nodejs
  - dependency-upgrade
preconditions:
  - org.openrewrite.FindSourceFiles:
      filePattern: package.json;**/package.json
recipeList:
  - org.openrewrite.json.ChangeValue:
      oldKeyPath: $.dependencies['@angular/common']
      value: '"20.3.26"'
  - org.openrewrite.json.ChangeValue:
      oldKeyPath: $.devDependencies['@angular/common']
      value: '"20.3.26"'
  - org.openrewrite.json.ChangeValue:
      oldKeyPath: $.peerDependencies['@angular/common']
      value: '"20.3.26"'
  - org.openrewrite.json.ChangeValue:
      oldKeyPath: $.optionalDependencies['@angular/common']
      value: '"20.3.26"'
