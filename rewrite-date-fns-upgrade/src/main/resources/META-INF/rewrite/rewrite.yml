type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.datefns.AuditDateFns4SourceCompatibility
displayName: Locate date-fns 4 source compatibility work
description: Mark internal/deep imports, remaining default subpath imports, CommonJS entry points, interval/error semantic changes, locale/constants, and time-zone context calls requiring application review.
tags:
  - date-fns
  - search
  - manual-review
preconditions:
  - org.openrewrite.text.Find:
      find: '["'']date-fns(?:/[^"'']*)?["'']'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,mts,cts}"
      contextSize: 0
recipeList:
  - org.openrewrite.text.Find:
      find: '["'']date-fns/(?:_lib/|[^"'']+/index(?:[.]js)?["''])'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,mts,cts}"
      contextSize: 100
  - org.openrewrite.text.Find:
      find: '\bimport[ \t]+[A-Za-z_$][A-Za-z0-9_$]*[ \t]+from[ \t]*["'']date-fns/'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,mts,cts}"
      contextSize: 100
  - org.openrewrite.text.Find:
      find: '\brequire[ \t]*\([ \t]*["'']date-fns(?:/[^"'']*)?["''][ \t]*\)'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,mts,cts}"
      contextSize: 100
  - org.openrewrite.text.Find:
      find: '\b(?:areIntervalsOverlapping|getOverlappingDaysInIntervals|isWithinInterval|each[A-Za-z]+OfInterval|intervalToDuration|roundToNearestMinutes)[ \t]*\('
      regex: true
      caseSensitive: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,mts,cts}"
      contextSize: 100
  - org.openrewrite.text.Find:
      find: '\b(?:TZDate|UTCDate|tz)[ \t]*(?:<|\()|\bin[ \t]*:'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,mts,cts}"
      contextSize: 100
  - org.openrewrite.text.Find:
      find: '\b(?:daysInYear|millisecondsInMinute|secondsInDay|secondsInHour|secondsInMinute|monthsInYear)[ \t]*[,}]|["'']date-fns/locale(?:/[^"'']*)?["'']'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{js,jsx,ts,tsx,mjs,cjs,mts,cts}"
      contextSize: 100
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.datefns.AuditDateFnsCompanionDependencies
displayName: Locate date-fns companion packages requiring compatibility review
description: Mark time-zone packages, DateIO adapters, and UI date adapters whose date-fns 4 compatibility is independently versioned.
tags:
  - date-fns
  - dependency-review
  - search
recipeList:
  - org.openrewrite.json.search.FindKey:
      key: $.dependencies['date-fns-tz']
  - org.openrewrite.json.search.FindKey:
      key: $.devDependencies['date-fns-tz']
  - org.openrewrite.json.search.FindKey:
      key: $.dependencies['@date-fns/tz']
  - org.openrewrite.json.search.FindKey:
      key: $.dependencies['@date-io/date-fns']
  - org.openrewrite.json.search.FindKey:
      key: $.dependencies['@mui/x-date-pickers']
