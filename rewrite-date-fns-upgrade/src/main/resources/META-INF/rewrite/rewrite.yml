type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.datefns.MigrateDeterministicDateFnsSourceTo4
displayName: Migrate deterministic date-fns v3/v4 source imports
description: Convert exact function subpath default imports and CommonJS assignments to named exports and remove public /index.js suffixes.
tags:
  - date-fns
