---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springweb.UpgradeSpringWebTo6_2_19
displayName: Upgrade workbook-selected Spring Web dependencies to 6.2.19
description: Upgrade only exact workbook source versions of org.springframework:spring-web in locally owned standard Maven or root Gradle declarations.
tags:
  - spring
  - spring-web
  - dependency-upgrade
recipeList:
  - com.huawei.clouds.openrewrite.springweb.UpgradeSelectedSpringWebDependency
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springweb.MigrateDeterministicSpringWeb6Java
displayName: Migrate deterministic Spring Web 6 Java APIs
description: Reuse audited OpenRewrite Core and rewrite-spring leaves for exact Spring Web incompatibilities without activating Framework, Boot, Jakarta, or WebFlux aggregates.
tags:
  - spring
  - spring-web
  - jakarta-ee
  - source-migration
preconditions:
  - com.huawei.clouds.openrewrite.springweb.IsSpringWebNonGeneratedSource
recipeList:
  - org.openrewrite.java.ChangePackage:
      oldPackageName: javax.servlet
      newPackageName: jakarta.servlet
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: javax.validation
      newPackageName: jakarta.validation
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: javax.xml.bind
      newPackageName: jakarta.xml.bind
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: javax.json
      newPackageName: jakarta.json
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: javax.activation
      newPackageName: jakarta.activation
      recursive: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.springframework.http.client.reactive.ReactorResourceFactory
      newFullyQualifiedTypeName: org.springframework.http.client.ReactorResourceFactory
      ignoreDefinition: false
  - org.openrewrite.java.ChangeMethodName:
      methodPattern: org.springframework.web.util.ContentCachingResponseWrapper getStatusCode()
      newMethodName: getStatus
      matchOverrides: false
      ignoreDefinition: false
  - com.huawei.clouds.openrewrite.springweb.MigrateRemovedSpringWebCalls
  - org.openrewrite.java.spring.framework.MigrateUtf8MediaTypes
  - org.openrewrite.java.spring.framework.MigrateResponseStatusExceptionGetRawStatusCodeMethod
  - org.openrewrite.java.spring.framework.MigrateResponseStatusExceptionGetStatusCodeMethod
  - org.openrewrite.java.spring.framework.MigrateClientHttpResponseGetRawStatusCodeMethod
  - org.openrewrite.java.spring.framework.MigrateMethodArgumentNotValidExceptionErrorMethod
  - org.openrewrite.java.ReplaceConstantWithAnotherConstant:
      existingFullyQualifiedConstantName: org.springframework.http.client.observation.ClientHttpObservationDocumentation.HighCardinalityKeyNames.CLIENT_NAME
      fullyQualifiedConstantName: org.springframework.http.client.observation.ClientHttpObservationDocumentation.LowCardinalityKeyNames.CLIENT_NAME
