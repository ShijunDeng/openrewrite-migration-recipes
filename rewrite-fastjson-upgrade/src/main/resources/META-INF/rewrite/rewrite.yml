---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.fastjson.UpgradeFastjsonTo2_0_62
displayName: Upgrade Fastjson to the 2.0.62 compatibility artifact
description: Upgrade com.alibaba:fastjson declarations to the Fastjson2 2.0.62 compatibility artifact while preserving Fastjson 1.x package names.
tags:
  - fastjson
  - fastjson2
  - java
  - dependency-upgrade
recipeList:
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: com.alibaba
      artifactId: fastjson
      newVersion: 2.0.62
      overrideManagedVersion: true
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.fastjson.MigrateFastjson1ToFastjson2Api
displayName: Migrate Fastjson 1.x dependency and package names to Fastjson2 2.0.62
description: Replace com.alibaba:fastjson with the native com.alibaba.fastjson2:fastjson2 artifact and recursively change com.alibaba.fastjson source package references to com.alibaba.fastjson2. API-level incompatibilities still require manual changes.
tags:
  - fastjson
  - fastjson2
  - java
  - dependency-migration
recipeList:
  - org.openrewrite.java.dependencies.ChangeDependency:
      oldGroupId: com.alibaba
      oldArtifactId: fastjson
      newGroupId: com.alibaba.fastjson2
      newArtifactId: fastjson2
      newVersion: 2.0.62
      overrideManagedVersion: true
      changeManagedDependency: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: com.alibaba.fastjson
      newPackageName: com.alibaba.fastjson2
      recursive: true
