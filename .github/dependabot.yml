version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      openrewrite:
        patterns:
          - "org.openrewrite:*"
          - "org.openrewrite.recipe:*"
      maven-plugins:
        patterns:
          - "org.apache.maven.plugins:*"
    ignore:
      # Major versions in this repository often represent the intentionally old
      # API surface consumed by a migration fixture, not a production dependency.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
