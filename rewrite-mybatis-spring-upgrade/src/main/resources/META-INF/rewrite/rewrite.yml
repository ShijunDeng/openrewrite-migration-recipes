---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.mybatisspring.UpgradeMyBatisSpringDependencyTo4_0_0
displayName: Upgrade MyBatis-Spring dependency to 4.0.0
description: Upgrade org.mybatis:mybatis-spring declarations in Maven and Gradle builds to 4.0.0 without changing application source or configuration.
tags:
  - mybatis
  - mybatis-spring
  - java
  - dependency-upgrade
recipeList:
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: org.mybatis
      artifactId: mybatis-spring
      newVersion: 4.0.0
      overrideManagedVersion: true
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.mybatisspring.MigrateMyBatisSpringTo4_0_0
displayName: Migrate MyBatis-Spring applications to 4.0.0
description: Upgrade MyBatis-Spring and migrate the Spring Batch infrastructure packages used by MyBatis batch readers and writers to their Spring Batch 6 names.
tags:
  - mybatis
  - mybatis-spring
  - spring-batch
  - java
  - source-migration
recipeList:
  - com.huawei.clouds.openrewrite.mybatisspring.UpgradeMyBatisSpringDependencyTo4_0_0
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.springframework.batch.item
      newPackageName: org.springframework.batch.infrastructure.item
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.springframework.batch.poller
      newPackageName: org.springframework.batch.infrastructure.poller
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.springframework.batch.repeat
      newPackageName: org.springframework.batch.infrastructure.repeat
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.springframework.batch.support
      newPackageName: org.springframework.batch.infrastructure.support
      recursive: true
