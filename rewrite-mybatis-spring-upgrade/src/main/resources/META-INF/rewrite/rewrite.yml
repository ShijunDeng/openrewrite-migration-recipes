  - mybatis-spring
  - dependency-upgrade
  - strict
recipeList:
  - com.huawei.clouds.openrewrite.mybatisspring.IsolateSharedMyBatisSpringVersionProperty
  - com.huawei.clouds.openrewrite.mybatisspring.UpgradeMyBatisSpring1_3_1To4_0_0
  - com.huawei.clouds.openrewrite.mybatisspring.UpgradeManagedMyBatisSpring1_3_1To4_0_0
  - com.huawei.clouds.openrewrite.mybatisspring.UpgradeMyBatisSpring2_0_4To4_0_0
  - com.huawei.clouds.openrewrite.mybatisspring.UpgradeManagedMyBatisSpring2_0_4To4_0_0
