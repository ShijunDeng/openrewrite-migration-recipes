displayName: Strictly upgrade listed MyBatis-Spring versions to 4.0.0
description: Upgrade only the seven spreadsheet source versions in direct Maven or Gradle declarations and local Maven dependencyManagement; when a Maven property is shared, use a 4.0.0 literal without changing unrelated dependencies, and do not override external management.
tags:
