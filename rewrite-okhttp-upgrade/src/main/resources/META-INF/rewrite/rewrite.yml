type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.okhttp.FindManualOkHttp5SourceRisks
displayName: Find OkHttp 5 source compatibility risks requiring review
description: Mark internal APIs, client inheritance and mocking, nullable credentials, Kotlin API forms, old MockWebServer packages, unresolved clone calls, alpha APIs, and connection behavior configuration.
tags:
  - okhttp
  - java
  - kotlin
  - search
  - manual-review
recipeList:
  - org.openrewrite.text.Find:
      find: '(?:import|from)[ \t]+okhttp3[.]internal(?:[.]|\b)|\bokhttp3[.]internal[.]'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{java,kt,kts}"
      contextSize: 80
  - org.openrewrite.text.Find:
      find: '\bextends[ \t]+OkHttpClient\b|:[ \t]*OkHttpClient[ \t]*\(|\b(?:mock|spy)[ \t]*\([ \t]*OkHttpClient(?:[.]class)?[ \t]*\)'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{java,kt,kts}"
      contextSize: 80
  - org.openrewrite.text.Find:
      find: '\bCredentials[.]basic[ \t]*\([^,]+,[ \t]*null\b|\bCredentials[.]basic[ \t]*\([ \t]*null\b'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{java,kt,kts}"
      contextSize: 80
  - org.openrewrite.text.Find:
      find: '\b(?:HttpUrl|MediaType)[.](?:parse|get)[ \t]*\(|\b(?:RequestBody|ResponseBody)[.]create[ \t]*\('
      regex: true
      caseSensitive: true
      filePattern: "**/*.{kt,kts}"
      contextSize: 80
  - org.openrewrite.text.Find:
      find: '\bokhttp3[.]mockwebserver(?:[.]|\b)'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{java,kt,kts}"
      contextSize: 80
  - org.openrewrite.text.Find:
      find: '\b(?:client|okHttpClient|httpClient)[.]clone[ \t]*\('
      regex: true
      caseSensitive: true
      filePattern: "**/*.{java,kt,kts}"
      contextSize: 80
  - org.openrewrite.text.Find:
      find: '@ExperimentalOkHttpApi\b|\bokhttp3[.]coroutines\b|\b(?:AddressPolicy|AsyncDns|ConnectionListener|SocketPolicy|RecordedRequest)[ \t]*(?:[.(<]|::)'
      regex: true
      caseSensitive: true
      filePattern: "**/*.{java,kt,kts}"
      contextSize: 80
  - org.openrewrite.text.Find:
      find: '\b(?:dns|proxy|proxySelector|certificatePinner|connectionSpecs|fastFallback|retryOnConnectionFailure)[ \t]*\('
      regex: true
      caseSensitive: true
      filePattern: "**/*.{java,kt,kts}"
      contextSize: 80
