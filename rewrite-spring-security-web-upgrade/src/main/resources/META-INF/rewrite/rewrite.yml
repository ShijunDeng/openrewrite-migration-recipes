type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springsecurityweb.MigrateSpringSecurityWeb_5_8
displayName: Apply deterministic Spring Security 5.8 migration leaves
description: Reuse every official 5.8 source/XML leaf without its broad dependency recipes.
tags:
  - spring
  - security
  - source-migration
  - official-openrewrite
recipeList:
  - org.openrewrite.java.spring.boot2.HttpSecurityLambdaDsl
  - org.openrewrite.java.spring.boot2.ServerHttpSecurityLambdaDsl
  - org.openrewrite.java.spring.boot2.HeadersConfigurerLambdaDsl
  - org.openrewrite.java.spring.security5.AuthorizeHttpRequests
  - org.openrewrite.java.spring.security5.ConvertSecurityMatchersToSecurityMatcher
  - org.openrewrite.java.spring.security5.UseNewRequestMatchers
  - org.openrewrite.java.spring.security5.UseNewSecurityMatchers
  - org.openrewrite.java.spring.security5.UpdatePbkdf2PasswordEncoder
  - org.openrewrite.java.spring.security5.UpdateSCryptPasswordEncoder
  - org.openrewrite.java.spring.security5.UpdateArgon2PasswordEncoder
  - org.openrewrite.java.spring.security5.RenameNimbusdsJsonObjectPackageName
  - org.openrewrite.java.spring.security5.ReplaceGlobalMethodSecurityWithMethodSecurity
  - org.openrewrite.java.spring.security5.ReplaceGlobalMethodSecurityWithMethodSecurityXml
  # The upstream XML recipe matches the unqualified tag. Reuse the same
  # official primitives for the two conventional namespace prefixes.
  - org.openrewrite.xml.ChangeTagName:
      elementName: security:global-method-security
      newName: security:method-security
  - org.openrewrite.xml.ChangeTagAttribute:
      elementName: security:method-security
      attributeName: pre-post-enabled
      newValue: null
      oldValue: true
  - org.openrewrite.xml.ChangeTagName:
      elementName: sec:global-method-security
      newName: sec:method-security
  - org.openrewrite.xml.ChangeTagAttribute:
      elementName: sec:method-security
      attributeName: pre-post-enabled
      newValue: null
      oldValue: true
---
type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springsecurityweb.MigrateSpringSecurityWeb_6_0
displayName: Apply deterministic Spring Security 6.0 and Jakarta Servlet migration leaves
description: >-
  Reuse every official 6.0 leaf and the official dependency/package primitives
  with Jakarta Servlet fixed at 6.0.0 instead of the broad Servlet 5 aggregate.
tags:
  - spring
  - security
  - jakarta
  - source-migration
  - official-openrewrite
recipeList:
  - org.openrewrite.java.dependencies.ChangeDependency:
      oldGroupId: javax.servlet
      oldArtifactId: javax.servlet-api
      newGroupId: jakarta.servlet
      newArtifactId: jakarta.servlet-api
      newVersion: 6.0.0
  - org.openrewrite.java.ChangePackage:
      oldPackageName: javax.servlet
      newPackageName: jakarta.servlet
      recursive: true
  - org.openrewrite.java.spring.security6.UseSha256InRememberMe
  - org.openrewrite.java.spring.security6.PropagateAuthenticationServiceExceptions
  - org.openrewrite.java.spring.security6.RequireExplicitSavingOfSecurityContextRepository
  - org.openrewrite.java.spring.security6.UpdateRequestCache
  - org.openrewrite.java.spring.security6.RemoveUseAuthorizationManager
  - org.openrewrite.xml.ChangeTagAttribute:
      elementName: security:websocket-message-broker
      attributeName: use-authorization-manager
      newValue: null
      oldValue: true
  - org.openrewrite.xml.ChangeTagAttribute:
      elementName: sec:websocket-message-broker
      attributeName: use-authorization-manager
      newValue: null
      oldValue: true
  - org.openrewrite.java.spring.security6.UpdateEnableReactiveMethodSecurity
  - org.openrewrite.java.spring.security6.RemoveFilterSecurityInterceptorOncePerRequest
