type: specs.openrewrite.org/v1beta/recipe
name: com.huawei.clouds.openrewrite.springbootactuator.MigrateSpringBootActuatorConfiguration
displayName: Migrate deterministic Spring Boot Actuator configuration
description: Move metrics exporter, probes, JMX, and observations properties and convert endpoint-enabled booleans to the Boot 3.4 access model.
tags:
  - spring-boot
  - actuator
  - configuration
preconditions:
  - com.huawei.clouds.openrewrite.springbootactuator.FindAuthoredSourceFiles
recipeList:
  # These are the official Spring-aware primitives used by
  # org.openrewrite.java.spring.boot3.SpringBootProperties_3_0. Keeping the
  # product prefixes here avoids pulling unrelated Boot properties into this
  # Actuator-focused module while retaining Properties, YAML, and annotation support.
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.appoptics
      newPropertyKey: management.appoptics.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.atlas
      newPropertyKey: management.atlas.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.datadog
      newPropertyKey: management.datadog.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.defaults
      newPropertyKey: management.defaults.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.dynatrace
      newPropertyKey: management.dynatrace.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.elastic
      newPropertyKey: management.elastic.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.ganglia
      newPropertyKey: management.ganglia.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.graphite
      newPropertyKey: management.graphite.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.humio
      newPropertyKey: management.humio.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.influx
      newPropertyKey: management.influx.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.jmx
      newPropertyKey: management.jmx.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.kairos
      newPropertyKey: management.kairos.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.newrelic
      newPropertyKey: management.newrelic.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.prometheus
      newPropertyKey: management.prometheus.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.signalfx
      newPropertyKey: management.signalfx.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.simple
      newPropertyKey: management.simple.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.stackdriver
      newPropertyKey: management.stackdriver.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.metrics.export.statsd
      newPropertyKey: management.statsd.metrics.export
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.health.probes.enabled
      newPropertyKey: management.endpoint.health.probes.enabled
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: management.endpoints.jmx.unique-names
      newPropertyKey: spring.jmx.unique-names
  - org.openrewrite.java.spring.ChangeSpringPropertyKey:
      oldPropertyKey: micrometer.observations.annotations.enabled
      newPropertyKey: management.observations.annotations.enabled
  - org.openrewrite.java.spring.boot3.SpringBootProperties_3_4_EnabledToAccess
